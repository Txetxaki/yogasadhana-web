<div class="usr-profile">
  <div class="usr-page-header">
    <div>
      <span class="usr-page-label">Mi Área</span>
      <h1 class="usr-page-title">Mi Perfil</h1>
    </div>
    <button class="usr-edit-btn" (click)="toggleEdit()">
      @if(editMode()) {
        <svg class="usr-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      } @else {
        <svg class="usr-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      }
      {{ editMode() ? 'Cancelar' : 'Editar' }}
    </button>
  </div>

  @if (saved()) {
    <div class="usr-saved-toast">
      <svg class="usr-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>
      Perfil guardado correctamente.
    </div>
  }

  <div class="usr-profile-grid">
    <!-- Avatar Card -->
    <div class="usr-panel usr-avatar-panel">
      <div class="usr-prof-avatar">{{ user?.avatar ?? '?' }}</div>
      <h2 class="usr-prof-name">{{ user?.name }}</h2>
      <span class="usr-prof-role">Alumna/o · YogaSadhana</span>
      <div class="usr-prof-meta-list">
        <div class="usr-prof-meta">
          <svg class="usr-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          {{ user?.email }}
        </div>
        <div class="usr-prof-meta">
          <svg class="usr-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></svg>
          Alta desde {{ user?.joinDate }}
        </div>
        <div class="usr-prof-meta">
          <svg class="usr-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
          {{ user?.favoriteStyle ?? 'Hatha Yoga' }}
        </div>
      </div>
      <button class="usr-logout-full" (click)="logout()">
        <svg class="usr-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
        Cerrar Sesión
      </button>
    </div>

    <!-- Settings -->
    <div class="usr-panel">
      <h3 class="usr-settings-title">Datos Personales</h3>
      <div class="usr-form">
        <div class="ys-field">
          <label>Nombre completo</label>
          <input type="text" [value]="user?.name" [disabled]="!editMode()" />
        </div>
        <div class="ys-field">
          <label>Email</label>
          <input type="email" [value]="user?.email" [disabled]="!editMode()" />
        </div>
        <div class="ys-field">
          <label>Estilo favorito</label>
          <select [disabled]="!editMode()">
            @for (style of yogaStyles; track style) {
              <option [value]="style" [selected]="style === user?.favoriteStyle">{{ style }}</option>
            }
          </select>
        </div>
      </div>

      @if (editMode()) {
        <button class="usr-save-btn" (click)="saveChanges()">
          <svg class="usr-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Guardar Cambios
        </button>
      }

      <hr class="usr-divider" />

      <h3 class="usr-settings-title">Seguridad</h3>
      <div class="usr-form">
        <div class="ys-field">
          <label>Contraseña actual</label>
          <input type="password" placeholder="••••••••" [disabled]="!editMode()" />
        </div>
        <div class="ys-field">
          <label>Nueva contraseña</label>
          <input type="password" placeholder="••••••••" [disabled]="!editMode()" />
        </div>
      </div>
    </div>
  </div>
</div>
