<div class="usr-shell">
  <aside class="usr-sidebar">
    <div class="usr-sidebar-header">
      <a routerLink="/yoga-sadhana" class="usr-brand">
        <svg class="usr-logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="none">
          <path d="M32 52 C32 52 32 44 32 40" stroke="#924a28" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M32 40 C22 38 12 30 16 20 C22 28 28 34 32 40Z" stroke="#924a28" stroke-width="1.6" fill="rgba(146,74,40,0.07)"/>
          <path d="M32 40 C42 38 52 30 48 20 C42 28 36 34 32 40Z" stroke="#924a28" stroke-width="1.6" fill="rgba(146,74,40,0.07)"/>
          <path d="M32 40 C32 30 28 18 32 10 C36 18 32 30 32 40Z" stroke="#924a28" stroke-width="1.8" fill="rgba(146,74,40,0.15)"/>
        </svg>
        <span>YogaSadhana</span>
      </a>
    </div>

    <div class="usr-profile-mini">
      <div class="usr-avatar">{{ auth.currentUser()?.avatar ?? '?' }}</div>
      <div>
        <span class="usr-p-name">{{ auth.currentUser()?.name }}</span>
        <span class="usr-p-role">Alumna/o</span>
      </div>
    </div>

    <nav class="usr-nav">
      <!-- Mi Área -->
      <a routerLink="/yoga-sadhana/dashboard" routerLinkActive="usr-nav-active"
         [routerLinkActiveOptions]="{exact: true}" class="usr-nav-item">
        <svg class="usr-nav-icon" viewBox="0 0 24 24" fill="none">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
          <polyline points="9 22 9 12 15 12 15 22" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
        </svg>
        <span>Mi Área</span>
      </a>
      <!-- Mis Reservas -->
      <a routerLink="/yoga-sadhana/dashboard/reservas" routerLinkActive="usr-nav-active"
         [routerLinkActiveOptions]="{exact: false}" class="usr-nav-item">
        <svg class="usr-nav-icon" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="5" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.6"/>
          <path d="M3 10h18" stroke="currentColor" stroke-width="1.6"/>
          <path d="M8 3v4M16 3v4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M8 15l2 2 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Mis Reservas</span>
      </a>
      <!-- Mi Perfil -->
      <a routerLink="/yoga-sadhana/dashboard/perfil" routerLinkActive="usr-nav-active"
         [routerLinkActiveOptions]="{exact: false}" class="usr-nav-item">
        <svg class="usr-nav-icon" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.6"/>
          <path d="M4 20c0-3.866 3.582-7 8-7s8 3.134 8 7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <span>Mi Perfil</span>
      </a>

      <div class="usr-nav-divider"></div>

      <!-- Ver la web -->
      <a routerLink="/yoga-sadhana" class="usr-nav-item usr-nav-web">
        <svg class="usr-nav-icon" viewBox="0 0 24 24" fill="none">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <polyline points="15 3 21 3 21 9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="10" y1="14" x2="21" y2="3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <span>Ver la web</span>
      </a>
    </nav>

    <div class="usr-sidebar-footer">
      <button class="usr-logout-btn" (click)="logout()">
        <svg class="usr-nav-icon" viewBox="0 0 24 24" fill="none">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <polyline points="16 17 21 12 16 7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        Cerrar Sesión
      </button>
    </div>
  </aside>

  <div class="usr-main">
    <div class="usr-content">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
