<div class="ys-auth-page">
  <aside class="ys-auth-panel">
    <div class="ys-auth-panel__inner">
      <a routerLink="/yoga-sadhana" class="ys-auth-brand">
        <svg class="ys-auth-logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="none">
          <path d="M32 52 C32 52 32 44 32 40" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M32 40 C22 38 12 30 16 20 C22 28 28 34 32 40Z" stroke="currentColor" stroke-width="1.6" fill="rgba(255,255,255,0.12)"/>
          <path d="M32 40 C42 38 52 30 48 20 C42 28 36 34 32 40Z" stroke="currentColor" stroke-width="1.6" fill="rgba(255,255,255,0.12)"/>
          <path d="M32 40 C32 30 28 18 32 10 C36 18 32 30 32 40Z" stroke="currentColor" stroke-width="1.8" fill="rgba(255,255,255,0.25)"/>
        </svg>
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-circle"><circle cx="12" cy="12" r="10"/></svg>
              {{ error() }}
            </div>
          }
          <div class="ys-field">
            <label for="forgot-email">Email</label>
            <input
              id="forgot-email"
              type="email"
              placeholder="tu@email.com"
              [(ngModel)]="email"
              name="email"
              autocomplete="email"
              required
            />
          </div>
          <button type="submit" class="ys-auth-btn" [class.ys-loading]="loading()">
            @if (loading()) {
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-circle"><circle cx="12" cy="12" r="10"/></svg>
              Enviar enlace de recuperación
            }
          </button>
        </form>
      } @else {
        <div class="ys-auth-success">
          <div class="ys-success-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-circle"><circle cx="12" cy="12" r="10"/></svg>
          </div>
          <h1 class="ys-auth-title">¡Enlace enviado!</h1>
          <p class="ys-auth-subtitle">
            Hemos enviado un email a <strong>{{ email }}</strong>.<br>
            Revisa tu bandeja de entrada.
          </p>
        </div>
      }

      <a routerLink="/yoga-sadhana/login" class="ys-auth-back">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-left"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg> Volver al login
      </a>
    </div>
  </main>
</div>
