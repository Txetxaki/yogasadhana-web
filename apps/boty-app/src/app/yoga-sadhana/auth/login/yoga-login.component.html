<div class="ys-auth-page">
  <!-- Left panel — editorial / hero -->
  <aside class="ys-auth-panel">
    <div class="ys-auth-panel__inner">
      <a routerLink="/yoga-sadhana" class="ys-auth-brand">
        <svg class="ys-auth-logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="none">
          <path d="M32 52 C32 52 32 44 32 40" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M32 40 C22 38 12 30 16 20 C22 28 28 34 32 40Z" stroke="currentColor" stroke-width="1.6" fill="rgba(255,255,255,0.12)"/>
          <path d="M32 40 C42 38 52 30 48 20 C42 28 36 34 32 40Z" stroke="currentColor" stroke-width="1.6" fill="rgba(255,255,255,0.12)"/>
          <path d="M32 40 C25 34 20 24 26 14 C28 24 30 32 32 40Z" stroke="currentColor" stroke-width="1.6" fill="rgba(255,255,255,0.2)"/>
          <path d="M32 40 C39 34 44 24 38 14 C36 24 34 32 32 40Z" stroke="currentColor" stroke-width="1.6" fill="rgba(255,255,255,0.2)"/>
          <path d="M32 40 C32 30 28 18 32 10 C36 18 32 30 32 40Z" stroke="currentColor" stroke-width="1.8" fill="rgba(255,255,255,0.25)"/>
        </svg>
        <span>YogaSadhana</span>
      </a>

      <div class="ys-auth-panel__content">
        <p class="ys-auth-panel__pre">Bienvenido de nuevo</p>
        <h2 class="ys-auth-panel__quote">
          "Encuentra tu centro<br>en el silencio."
        </h2>
        <p class="ys-auth-panel__sub">
          Una práctica diseñada para reconectar<br>con tu esencia más pura.
        </p>
      </div>

      <!-- Decorative blobs -->
      <div class="ys-panel-blob ys-panel-blob--1"></div>
      <div class="ys-panel-blob ys-panel-blob--2"></div>
    </div>
  </aside>

  <!-- Right panel — login form -->
  <main class="ys-auth-form-side">
    <!-- Blob background -->
    <div class="ys-auth-blob ys-auth-blob--1"></div>
    <div class="ys-auth-blob ys-auth-blob--2"></div>

    <div class="ys-auth-card">
      <div class="ys-auth-header">
        <span class="ys-auth-label">Acceso Alumnos</span>
        <h1 class="ys-auth-title">Inicia Sesión</h1>
        <p class="ys-auth-subtitle">Tu práctica te espera.</p>
      </div>

      <form class="ys-auth-form" (ngSubmit)="onSubmit()" #loginForm="ngForm">
        @if (error()) {
          <div class="ys-auth-error" role="alert">
            <svg viewBox="0 0 24 24" fill="none" width="16" height="16" style="flex-shrink:0">
              <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/>
              <line x1="12" y1="8" x2="12" y2="12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              <circle cx="12" cy="16" r="0.8" fill="currentColor"/>
            </svg>
            {{ error() }}
          </div>
        }

        <div class="ys-field">
          <label for="login-email">Email</label>
          <input
            id="login-email"
            type="email"
            placeholder="tu@email.com"
            [(ngModel)]="email"
            name="email"
            autocomplete="email"
            required
          />
        </div>

        <div class="ys-field">
          <label for="login-password">Contraseña</label>
          <div class="ys-field-pw">
            <input
              id="login-password"
              [type]="showPassword() ? 'text' : 'password'"
              placeholder="••••••••"
              [(ngModel)]="password"
              name="password"
              autocomplete="current-password"
              required
            />
            <button type="button" class="ys-pw-toggle" (click)="togglePassword()" aria-label="Mostrar contraseña">
              @if (showPassword()) {
                <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                  <line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                </svg>
              } @else {
                <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.6"/>
                  <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/>
                </svg>
              }
            </button>
          </div>
        </div>

        <div class="ys-auth-forgot">
          <a routerLink="/yoga-sadhana/forgot-password">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="ys-auth-btn" [class.ys-loading]="loading()">
          @if (loading()) {
            <span class="ys-spinner"></span>
            Entrando...
          } @else {
            <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <polyline points="10 17 15 12 10 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <line x1="15" y1="12" x2="3" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            Iniciar Sesión
          }
        </button>
      </form>

      <p class="ys-auth-switch">
        ¿Sin cuenta? <a routerLink="/yoga-sadhana/register">Regístrate gratis</a>
      </p>
      <a routerLink="/yoga-sadhana" class="ys-auth-back">
        <svg viewBox="0 0 24 24" fill="none" width="14" height="14">
          <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Volver a la web
      </a>
    </div>
  </main>
</div>
