<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="utf-8" />
    <title>YogaSadhana · Centro de Yoga en Ciudad Real</title>
    <meta name="description" content="Centro de yoga en Ciudad Real. Hatha, Vinyasa, Yin, Yoga Suave, Khatva y Osteopatía. Reserva tu clase." />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function(l){
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(
            null, null,
            l.pathname.slice(0, -1) + decoded[0] +
            (decoded[1] ? '?' + decoded[1] : '') +
            l.hash
          );
        }
      }(window.location));
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.82/build/spline-viewer.js"></script>
  </head>
